version: 2

models:
  - name: int_token_profiles
    description: One row per token combining market data, CoinGecko metadata, and optional matched protocol TVL.
    columns:
      - name: coin_id
        description: CoinGecko coin identifier.
        data_tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_coingecko__coins_markets')
              field: coin_id

  - name: int_protocol_metrics
    description: One row per protocol with aggregated yield-pool metrics (avg apy, total pool tvl, pool count).
    columns:
      - name: protocol_id
        description: DeFi Llama protocol identifier.
        data_tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_defi_llama__protocols')
              field: protocol_id

  - name: int_whale_activity
    description: One row per wallet address aggregating ETH + token transfer activity.
    columns:
      - name: address
        description: Wallet address (lowercased).
        data_tests:
          - unique
          - not_null

  - name: int_exchange_token_coverage
    description: Exchange-token coverage pairs (top-10 exchanges x top-20 coins).
    columns:
      - name: coverage_id
        description: Surrogate key over (exchange_id, coin_id).
        data_tests:
          - unique
          - not_null
      - name: exchange_id
        description: CoinGecko exchange identifier.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_coingecko__exchanges')
              field: exchange_id
      - name: coin_id
        description: CoinGecko coin identifier.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_coingecko__coins_markets')
              field: coin_id
