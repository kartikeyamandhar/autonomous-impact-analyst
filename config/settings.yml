# Runtime configuration for the Autonomous Impact Analyst.
# Tunables only. Secrets and connection strings live in .env.

# ---------------------------------------------------------------------------
# Risk scoring
#
# Per-node risk in [0, 1] is computed as a weighted sum of these factors.
# Weights MUST sum to exactly 1.0.
# ---------------------------------------------------------------------------
risk_scoring:
  # Consumed by src/agent/risk_scorer.score_node(). Weights MUST sum to 1.0.
  weights:
    test_coverage: 0.30       # uncovered nodes -> higher risk
    fan_out: 0.25             # more downstream dependents -> higher risk
    exposure_distance: 0.25   # closer to an exposure -> higher risk
    materialization: 0.20     # views recompute live -> higher risk than tables

  # Thresholds bucket the max node score into a discrete level.
  # MUST be strictly ascending: low < medium < high.
  thresholds:
    low: 0.30
    medium: 0.60
    high: 0.85

  # Contextual modifiers applied after the base weighted score.
  # Decay is intentionally mild: in a lineage DAG the most important nodes
  # (marts feeding exposures) are far from the source, so heavy distance decay
  # would wrongly suppress them.
  distance_decay: 0.05            # slight risk decay per hop from the anomaly source
  exposure_priority_boost: 1.15   # escalate when a high-priority exposure is reached

# Per-anomaly-severity multiplier applied to node scores.
severity_modifiers:
  info: 0.85
  warning: 0.95
  error: 1.10
  critical: 1.25

# ---------------------------------------------------------------------------
# Agent (LangGraph) runtime
# ---------------------------------------------------------------------------
agent:
  model: claude-haiku-4-5-20251001
  fallback_model: claude-sonnet-4-6   # used after the primary model fails
  max_retries: 3
  retry_backoff_seconds: 2
  prompt_caching: true
  require_approval: false              # hold github_pr / pause_dbt_run for human approval
  dedup_window_minutes: 60            # suppress duplicate actions within this window
  incident_dir: data/incidents
  correlation_window_minutes: 15      # group simultaneous anomalies into one incident

# ---------------------------------------------------------------------------
# Monitoring scope and cadence
# ---------------------------------------------------------------------------
monitoring:
  schedule_minutes: 15
  raw_schema: raw
  watch_sources:
    - coingecko_coins_markets
    - coingecko_coins_detail
    - coingecko_exchanges
    - defi_llama_protocols
    - defi_llama_yields_pools
    - etherscan_eth_transactions
    - etherscan_token_transfers
  max_traversal_depth: 10
  prune_unused_columns: true

# ---------------------------------------------------------------------------
# Data quality thresholds
# ---------------------------------------------------------------------------
data_quality:
  row_count_drop_ratio: 0.20      # >20% drop vs. baseline triggers an event
  null_ratio_spike_delta: 0.10    # >10pp increase in null ratio triggers an event
  value_range_breach_stddev: 3.0  # >3 sigma outside baseline range
  min_baseline_samples: 5

# ---------------------------------------------------------------------------
# Freshness defaults (per source). Override via dbt source freshness configs.
# ---------------------------------------------------------------------------
freshness:
  default_warn_after_hours: 6
  default_error_after_hours: 24
  loaded_at_field: ingested_at

# ---------------------------------------------------------------------------
# Action toggles. Disable to dry-run an action type.
# ---------------------------------------------------------------------------
actions:
  enable_log: true
  enable_slack_alert: true
  enable_github_pr: true
  enable_pause_dbt_run: false
  github_pr_branch_prefix: impact-analyst/fix
  slack_alert_min_severity: warning

# ---------------------------------------------------------------------------
# External API rate limits (sleep seconds between calls).
# CoinGecko demo: 30/min -> 2.5s. Etherscan free: 5/sec -> 0.25s.
# ---------------------------------------------------------------------------
rate_limits:
  coingecko_sleep_seconds: 2.5
  etherscan_sleep_seconds: 0.25
  defi_llama_sleep_seconds: 1.0
  max_retries: 3
  retry_backoff_seconds: 5
