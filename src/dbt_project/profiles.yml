autonomous_impact_analyst:
  target: dev
  outputs:
    dev:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      catalog: "{{ env_var('DATABRICKS_CATALOG', 'hive_metastore') }}"
      schema: "{{ env_var('DATABRICKS_SCHEMA_STAGING', 'staging') }}"
      threads: 4
      connect_retries: 5
      connect_timeout: 60
